    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <input type="url" id="url" placeholder="Enter the URL">
        <br>
        <input type="file" id="file" accept=".pdf, .csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel">
        <br><br>

        <textarea id="input"
            placeholder="Ask Question"
            rows="10"
            cols="50"></textarea>

        <br><br>

        <button onclick="searchPython()">
            Ask Question from Uploaded File,
            Search Books
            OR
            External URL
            In Python
        </button>
        <br>
        <button type="button" onclick="searchNode()">Sentiment Analysis In Node</button>
        <br>
        <div id="sentiment-response"></div>
        <div id="search-response"></div>
        <script>
            const input = document.getElementById('input');
            const url = document.getElementById('url');
            const file = document.getElementById('file');
            
            const sentiment = document.getElementById('sentiment-response');
            const search = document.getElementById('search-response');
            
            async function searchNode() {
                sentiment.innerHTML = 'Loading...'
                
                try {
                    const response = await fetch('https://node-does-sentiment-analysis.onrender.com/node-search', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: input.value })
                    });
                
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const data = await response.json();
                    console.log(data);
                    sentiment.textContent = '';

                    data.sentiment.forEach(element => {
                        sentiment.textContent +=
                            `{ Label: ${element.label}, Score: ${element.score} }\n`;
                    });
                } catch (err) {
                    console.error(err);
                    sentiment.textContent = err.message;
                }
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function linkify(text) {
                const escaped = escapeHtml(text);

                return escaped.replace(
                    /(https?:\/\/[^\s]+)/g,
                    '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>'
                );
            }

            async function searchPython() {
                const formData = new FormData();

                formData.append("question", input.value);
                formData.append("url", url.value);
                if (file.files[0]) {
                    const maxSize = 10 * 1024 * 1024;

                    if (file.files[0].size > maxSize) {
                        search.textContent = 'File too large';
                        return;
                    }

                    formData.append("file", file.files[0]);
                }


                search.innerHTML = 'Loading...'
                try {
                    const response = await fetch(
                        // I just found out why render deployed my python app
                        // But did shutdown python server after 20minutes of deactivity
                        'https://python-rag-semantic-search-pdf.onrender.com/search',
                        // So this next line is wrong and I am just keeping it to know it doesn't work
                        // 'https://node-does-sentiment-analysis.onrender.com/python-search',
                        {
                        method: 'POST',
                        body: formData
                    });
    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
    
                    const data = await response.json();
                    console.log(data);
                    // if part of data.answer is url wrap that part in <a> tag and if the answer is a list display each item of answer in a new line
                    if (Array.isArray(data.answer)) {
                        search.innerHTML =
                            '<ul>' +
                                data.answer.map(item => `<li>${escapeHtml(item)}</li>`).join('') +
                            '</ul>';
                    } else {
                        search.innerHTML =
                            'Question: ' +
                            data.question +
                            '<br><br>Answer:<br>' +
                            linkify(data.answer);
                    }
                } catch (err) {
                    console.error(err);
                    search.textContent = err.message;
                }
            }
        </script>
    </body>
    </html>
