    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <input type="url" id="url" placeholder="Enter the URL">
        <br>
        <input type="file" id="file" accept=".pdf, .csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel">
        <br><br>

        <textarea id="input"
            placeholder="Ask Question"
            rows="10"
            cols="50"></textarea>

        <br><br>

        <button onclick="searchPython()">
            Ask Question from Uploaded File
        </button>
        <br>
        <button type="button" onclick="searchPython()">Search Attention is All You Need PDF OR URL In Python</button>
        <button type="button" onclick="searchNode()">Sentiment Analysis In Node</button>
        <br>
        <div id="sentiment-response"></div>
        <div id="search-response"></div>
        <script>
            const input = document.getElementById('input');
            const url = document.getElementById('url');
            const file = document.getElementById('file');
            
            const sentiment = document.getElementById('sentiment-response');
            const search = document.getElementById('search-response');
            
            async function searchNode() {
                sentiment.innerHTML = 'Loading...'
                const response = await fetch('https://node-does-sentiment-analysis.onrender.com/node-search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input.value })
                });
                const data = await response.json();
                console.log(data);
                sentiment.innerHTML = '';
                data.sentiment.forEach(element => {
                    sentiment.innerHTML += '{ Label: ' + element.label + ', Score: ' + element.score + ' }<br>';
                });
            }

            async function searchPython() {
                const formData = new FormData();

                formData.append("question", input.value);
                formData.append("url", url.value);
                formData.append("file", file.files[0]);


                search.innerHTML = 'Loading...'
                const response = await fetch(
                    // I just found out why render deployed my python app
                    // But did shutdown python server after 20minutes of deactivity
                    // It happened because I was calling my python URL from my node backend
                    // And I must call my python server from my frontend not node
                    'https://python-rag-semantic-search-pdf.onrender.com/search',
                    // So this next line is wrong and I am just keeping it to know it doesn't work
                    // 'https://node-does-sentiment-analysis.onrender.com/python-search',
                    {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                console.log(data);
                search.innerHTML = 'Question: ' + data.question + '<br><br>Answer:<br>' + data.answer;
            }
        </script>
    </body>
    </html>
